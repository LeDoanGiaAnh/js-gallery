<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Photo Gallery - Accessible Edition</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<!-- Yêu cầu 8: Thêm sự kiện onload gọi đến hàm initializeGallery -->
<body onload="initializeGallery()">

    <div id="image">
        Hover over an image below to display here.
    </div>

    <!-- Yêu cầu 2 & 6: 6 hình ảnh có alt đầy đủ và có đủ bộ 4 sự kiện tương tác -->
    <div class="gallery">
        <img class="preview" 
             alt="Beautiful Autumn Forest" 
             src="https://images.unsplash.com/photo-1447933601403-0c6688de566e?q=80&w=500" 
             onmouseover="upDate(this)" 
             onmouseleave="undo()"
             onfocus="upDate(this)" 
             onblur="undo()">

        <img class="preview" 
             alt="Cozy Coffee Cup" 
             src="https://images.unsplash.com/photo-1514432324607-a09d9b4aefdd?q=80&w=500" 
             onmouseover="upDate(this)" 
             onmouseleave="undo()"
             onfocus="upDate(this)" 
             onblur="undo()">

        <img class="preview" 
             alt="Charming Coffee Shop" 
             src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?q=80&w=500" 
             onmouseover="upDate(this)" 
             onmouseleave="undo()"
             onfocus="upDate(this)" 
             onblur="undo()">

        <img class="preview" 
             alt="Cute Sleeping Cat" 
             src="https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?q=80&w=500" 
             onmouseover="upDate(this)" 
             onmouseleave="undo()"
             onfocus="upDate(this)" 
             onblur="undo()">

        <img class="preview" 
             alt="Happy Dog Running" 
             src="https://images.unsplash.com/photo-1543466835-00a7907e9de1?q=80&w=500" 
             onmouseover="upDate(this)" 
             onmouseleave="undo()"
             onfocus="upDate(this)" 
             onblur="undo()">

        <img class="preview" 
             alt="Majestic Mountains" 
             src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=500" 
             onmouseover="upDate(this)" 
             onmouseleave="undo()"
             onfocus="upDate(this)" 
             onblur="undo()">
    </div>

    <script src="js/gallery.js"></script>
</body>
</html>
